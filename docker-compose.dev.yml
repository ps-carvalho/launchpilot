# ═══════════════════════════════════════════════════════════════════════════════
# Development override for LaunchPilot
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# This override mounts source code for live PHP changes without rebuild.
# Frontend assets must be built on the host first:
#   npm run build
#
# For Vite HMR (hot module replacement), run `npm run dev` on your host
# and set VITE_USE_DEV_SERVER=true below.
# ═══════════════════════════════════════════════════════════════════════════════

services:
  app:
    volumes:
      - ./public:/var/www/public
      - ./app:/var/www/app
      - ./config:/var/www/config
      - ./modules:/var/www/modules
      - ./storage:/var/www/storage
    environment:
      # Set to true if you are running `npm run dev` on your host for HMR
      VITE_USE_DEV_SERVER: "false"
      VITE_DEV_SERVER_URL: "http://host.docker.internal:5173"
      CACHE_DRIVER: redis
      CACHE_REDIS_HOST: redis
      CACHE_REDIS_PORT: 6379
      CACHE_REDIS_DB: 0
      CACHE_REDIS_PREFIX: "launchpilot:cache:"

  worker:
    volumes:
      - ./app:/var/www/app
      - ./config:/var/www/config
      - ./modules:/var/www/modules
      - ./storage:/var/www/storage
    environment:
      CACHE_DRIVER: redis
      CACHE_REDIS_HOST: redis
      CACHE_REDIS_PORT: 6379
      CACHE_REDIS_DB: 0
      CACHE_REDIS_PREFIX: "launchpilot:cache:"

  nginx:
    volumes:
      - ./public:/var/www/public

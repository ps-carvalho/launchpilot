# ═══════════════════════════════════════════════════════════════════════════════
# Development override for LaunchPilot
# 
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# This override:
#   - Mounts ./public so Vite dev server / host builds are immediately visible
#   - Mounts app source code for live PHP changes without rebuild
#   - Enables Vite dev server integration
#   - Runs PHP dev server instead of FPM for simpler setup
# ═══════════════════════════════════════════════════════════════════════════════

services:
  app:
    volumes:
      - ./public:/var/www/public
      - ./app:/var/www/app
      - ./config:/var/www/config
      - ./modules:/var/www/modules
      - ./storage:/var/www/storage
    environment:
      VITE_USE_DEV_SERVER: "true"
      VITE_DEV_SERVER_URL: "http://host.docker.internal:5173"
    # Override FPM with PHP built-in server for simpler dev setup
    command: ["php", "-S", "0.0.0.0:9000", "-t", "public", "public/index.php"]
    ports:
      - "8000:9000"

  nginx:
    volumes:
      - ./public:/var/www/public
    # In dev mode, nginx proxies to host Vite dev server for assets
    # The app container returns HTML with Vite dev server URLs

  # Optional: Vite dev server runs on host, not in Docker
  # Run `npm run dev` on your host machine

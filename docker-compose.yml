services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: launchpilot-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: launchpilot
      POSTGRES_USER: launchpilot
      POSTGRES_PASSWORD: launchpilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U launchpilot -d launchpilot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
